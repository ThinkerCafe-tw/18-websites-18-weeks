<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家教好手 TutorMatch</title>
<style>
/* === 全域變數 === */
:root {
  --primary: #2563eb;
  --primary-dark: #1d4ed8;
  --primary-light: #dbeafe;
  --primary-bg: #eff6ff;
  --text: #1e293b;
  --text-light: #64748b;
  --bg: #f8fafc;
  --white: #ffffff;
  --border: #e2e8f0;
  --shadow: 0 1px 3px rgba(0,0,0,.08);
  --shadow-md: 0 4px 12px rgba(0,0,0,.1);
  --radius: 10px;
  --star: #f59e0b;
  --match-high: #16a34a;
  --match-mid: #2563eb;
}

/* === 基底 === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "Noto Sans TC", "Helvetica Neue", Arial, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
a { color: var(--primary); text-decoration: none; }

/* === 導覽列 === */
[data-block="nav"] {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  position: sticky; top: 0; z-index: 100;
}
[data-block="nav"] .inner {
  max-width: 1200px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
  height: 60px;
}
[data-block="nav"] .logo {
  font-size: 1.25rem; font-weight: 700; color: var(--primary);
  display: flex; align-items: center; gap: 8px;
}
[data-block="nav"] .logo svg { width: 28px; height: 28px; }
[data-block="nav"] ul { list-style: none; display: flex; gap: 28px; }
[data-block="nav"] ul a { color: var(--text); font-size: .9rem; font-weight: 500; }
[data-block="nav"] ul a:hover { color: var(--primary); }

/* === Hero 搜尋區 === */
[data-block="hero"] {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  color: var(--white); text-align: center;
  padding: 56px 24px 48px;
}
[data-block="hero"] h1 { font-size: 2rem; margin-bottom: 8px; }
[data-block="hero"] p { opacity: .85; margin-bottom: 32px; }

/* 搜尋列 */
.search-bar {
  max-width: 820px; margin: 0 auto;
  background: var(--white); border-radius: var(--radius);
  padding: 16px 20px;
  display: flex; flex-wrap: wrap; gap: 12px; align-items: end;
  box-shadow: var(--shadow-md);
}
.search-bar label { display: flex; flex-direction: column; gap: 4px; font-size: .78rem; color: var(--text-light); font-weight: 600; flex: 1; min-width: 140px; }
.search-bar select, .search-bar input[type="range"] {
  border: 1px solid var(--border); border-radius: 6px;
  padding: 8px 10px; font-size: .9rem; color: var(--text);
  background: var(--bg); width: 100%;
}
.search-bar input[type="range"] { padding: 4px 0; accent-color: var(--primary); }
.range-val { font-size: .82rem; color: var(--primary); font-weight: 700; text-align: right; }
.search-bar button {
  background: var(--primary); color: var(--white); border: none;
  border-radius: 6px; padding: 10px 28px; font-size: .95rem;
  font-weight: 600; cursor: pointer; white-space: nowrap;
}
.search-bar button:hover { background: var(--primary-dark); }

/* === 主內容區 === */
[data-block="main"] {
  max-width: 1200px; margin: 0 auto; padding: 32px 24px;
  display: flex; gap: 24px;
}

/* 側邊欄 */
aside.filter {
  width: 220px; flex-shrink: 0;
  background: var(--white); border-radius: var(--radius);
  padding: 20px; box-shadow: var(--shadow);
  align-self: flex-start; position: sticky; top: 80px;
}
aside.filter h3 { font-size: .95rem; margin-bottom: 12px; color: var(--primary); }
.filter-group { margin-bottom: 20px; }
.filter-group h4 { font-size: .82rem; color: var(--text-light); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .5px; }
.filter-group label {
  display: flex; align-items: center; gap: 8px;
  font-size: .88rem; margin-bottom: 6px; cursor: pointer;
}
.filter-group input[type="checkbox"] { accent-color: var(--primary); }

/* 老師卡片網格 */
.cards { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }

.card {
  background: var(--white); border-radius: var(--radius);
  box-shadow: var(--shadow); overflow: hidden; cursor: pointer;
  transition: box-shadow .2s, transform .2s;
}
.card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
.card-top { display: flex; gap: 14px; padding: 18px 18px 14px; }
.card-top img {
  width: 68px; height: 68px; border-radius: 50%; object-fit: cover;
  border: 2px solid var(--primary-light);
}
.card-info { flex: 1; }
.card-info h3 { font-size: 1.05rem; margin-bottom: 2px; }
.card-info .subject { font-size: .82rem; color: var(--primary); font-weight: 600; }
.card-meta {
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 18px 14px; font-size: .85rem;
}
.card-meta .price { font-weight: 700; color: var(--text); }
.stars { color: var(--star); letter-spacing: 1px; }
.match-badge {
  display: inline-block; padding: 2px 10px; border-radius: 20px;
  font-size: .75rem; font-weight: 700; color: var(--white);
}
.match-high { background: var(--match-high); }
.match-mid { background: var(--match-mid); }

/* 展開詳情 */
.card-detail {
  max-height: 0; overflow: hidden;
  transition: max-height .35s ease;
  background: var(--primary-bg); padding: 0 18px;
}
.card-detail.open { max-height: 300px; padding: 16px 18px; }
.card-detail p { font-size: .88rem; color: var(--text-light); margin-bottom: 8px; }
.card-detail .tags span {
  display: inline-block; background: var(--primary-light); color: var(--primary);
  padding: 2px 10px; border-radius: 12px; font-size: .78rem; margin-right: 6px; margin-bottom: 4px;
}
.card-detail .cta {
  display: inline-block; margin-top: 10px;
  background: var(--primary); color: var(--white);
  padding: 8px 20px; border-radius: 6px; font-size: .88rem; font-weight: 600;
  border: none; cursor: pointer;
}

/* === Footer === */
[data-block="footer"] {
  text-align: center; padding: 32px 24px; font-size: .82rem;
  color: var(--text-light); border-top: 1px solid var(--border); margin-top: 40px;
}

/* === RWD === */
@media (max-width: 768px) {
  [data-block="nav"] ul { display: none; }
  [data-block="main"] { flex-direction: column; }
  aside.filter { width: 100%; position: static; }
  .cards { grid-template-columns: 1fr; }
  .search-bar { flex-direction: column; }
}

/* === sticky footer (batch patch) === */
html, body { height: 100%; }
body {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}
main { flex: 1 0 auto; }
.site-footer, footer, [data-block="footer"] { margin-top: auto; }

</style>
</head>
<body>

<!-- 導覽列 -->
<nav data-block="nav">
  <div class="inner">
    <div class="logo">
      <!-- 書本圖示 -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
      家教好手 TutorMatch
    </div>
    <ul>
      <li><a href="#search">找老師</a></li>
      <li><a href="#how">使用方式</a></li>
      <li><a href="#faq">常見問題</a></li>
      <li><a href="#contact">聯絡我們</a></li>
    </ul>
  </div>
</nav>

<!-- Hero 搜尋區 -->
<header data-block="hero" id="search">
  <h1>找到最適合你的家教老師</h1>
  <p>超過 2,000 位認證師資，AI 智慧配對，第一堂免費試教</p>

  <form class="search-bar" onsubmit="event.preventDefault(); alert('搜尋結果已更新！');">
    <label>
      科目
      <select>
        <option value="">全部科目</option>
        <option>數學</option><option>英文</option><option>物理</option>
        <option>化學</option><option>國文</option><option>程式設計</option>
      </select>
    </label>
    <label>
      年級
      <select>
        <option value="">全部年級</option>
        <option>國小</option><option>國中</option><option>高中</option><option>大學</option><option>成人</option>
      </select>
    </label>
    <label>
      時薪範圍 <span class="range-val" id="rangeVal">$800</span>
      <input type="range" min="300" max="2000" step="100" value="800"
        oninput="document.getElementById('rangeVal').textContent='$'+this.value">
    </label>
    <button type="submit">
      <!-- 搜尋圖示 -->
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="vertical-align:-2px;margin-right:4px"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      搜尋
    </button>
  </form>
</header>

<!-- 主內容 -->
<section data-block="main">

  <!-- 篩選側邊欄 -->
  <aside class="filter">
    <h3>進階篩選</h3>

    <div class="filter-group">
      <h4>地區</h4>
      <label><input type="checkbox"> 台北市</label>
      <label><input type="checkbox"> 新北市</label>
      <label><input type="checkbox"> 台中市</label>
      <label><input type="checkbox"> 高雄市</label>
      <label><input type="checkbox"> 線上教學</label>
    </div>

    <div class="filter-group">
      <h4>評分</h4>
      <label><input type="checkbox"> 4.5 以上</label>
      <label><input type="checkbox"> 4.0 以上</label>
      <label><input type="checkbox"> 3.5 以上</label>
    </div>

    <div class="filter-group">
      <h4>可授課時間</h4>
      <label><input type="checkbox"> 平日白天</label>
      <label><input type="checkbox"> 平日晚上</label>
      <label><input type="checkbox"> 週末</label>
    </div>
  </aside>

  <!-- 老師卡片 -->
  <div class="cards" id="teacherCards">
    <!-- 由 JS 動態產生 -->
  </div>
</section>

<footer data-block="footer">
  <p>&copy; 2026 家教好手 TutorMatch. All rights reserved.</p>
</footer>

<script>
/* === 老師資料 === */
const teachers = [
  { name: "林書宏", subject: "數學．高中", price: 800, rating: 4.9, match: 96,
    img: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=200&h=200&fit=crop&crop=faces",
    bio: "台大數學系畢業，10 年教學經驗。擅長引導式教學，讓學生從理解中建立信心。",
    tags: ["微積分","排列組合","學測衝刺"] },
  { name: "陳怡安", subject: "英文．國中", price: 650, rating: 4.8, match: 92,
    img: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=200&h=200&fit=crop&crop=faces",
    bio: "留英碩士，多益 990 分。課程結合生活情境，讓英文不再枯燥。",
    tags: ["文法","閱讀","會話","多益"] },
  { name: "王建志", subject: "物理．高中", price: 900, rating: 4.7, match: 88,
    img: "https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=200&h=200&fit=crop&crop=faces",
    bio: "清大物理所碩士，專攻力學與電磁學。以實驗影片輔助教學，概念更具體。",
    tags: ["力學","電磁學","實驗"] },
  { name: "張雅琪", subject: "國文．國小", price: 550, rating: 5.0, match: 85,
    img: "https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=200&h=200&fit=crop&crop=faces",
    bio: "師大國文系，8 年國小教學經驗。用故事與遊戲啟發孩子的閱讀興趣。",
    tags: ["閱讀理解","作文","成語"] },
  { name: "李柏翰", subject: "程式設計．大學", price: 1200, rating: 4.6, match: 80,
    img: "https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=200&h=200&fit=crop&crop=faces",
    bio: "Google 前端工程師，5 年業界經驗。教 Python、JavaScript，專案導向教學。",
    tags: ["Python","JavaScript","React","演算法"] },
  { name: "黃詩涵", subject: "化學．高中", price: 750, rating: 4.8, match: 78,
    img: "https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=200&h=200&fit=crop&crop=faces",
    bio: "成大化學系，3 年補教經驗。獨創口訣記憶法，有機化學不再是惡夢。",
    tags: ["有機化學","無機化學","實驗操作"] }
];

/* 產生卡片 */
const container = document.getElementById('teacherCards');
teachers.forEach((t, i) => {
  const starsFull = '★'.repeat(Math.floor(t.rating));
  const starsHalf = t.rating % 1 >= 0.5 ? '☆' : '';
  const matchClass = t.match >= 90 ? 'match-high' : 'match-mid';

  container.insertAdjacentHTML('beforeend', `
    <article class="card" onclick="toggleDetail(${i})">
      <div class="card-top">
        <img src="${t.img}" alt="${t.name}" loading="lazy">
        <div class="card-info">
          <h3>${t.name}</h3>
          <span class="subject">${t.subject}</span>
        </div>
        <span class="match-badge ${matchClass}">${t.match}% 配對</span>
      </div>
      <div class="card-meta">
        <span class="price">$${t.price}/hr</span>
        <span class="stars">${starsFull}${starsHalf} ${t.rating}</span>
      </div>
      <div class="card-detail" id="detail-${i}">
        <p>${t.bio}</p>
        <div class="tags">${t.tags.map(tag => `<span>${tag}</span>`).join('')}</div>
        <button class="cta" onclick="event.stopPropagation(); alert('已送出預約試教申請！')">預約試教</button>
      </div>
    </article>
  `);
});

/* 摺疊面板切換 */
function toggleDetail(idx) {
  const el = document.getElementById('detail-' + idx);
  el.classList.toggle('open');
}
</script>
</body>
</html>
